services:
  - type: web
    name: sift-api
    runtime: node
    plan: free
    region: singapore
    rootDir: .
    buildCommand: npm ci --include=dev && npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && npm run build --workspace api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: LLM_FALLBACK_ORDER
        value: groq,gemini
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_DAILY_LIMIT
        value: "500"
